name: Selenium Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout your code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4️⃣ Run Pytest with HTML Report (PYTHONPATH set)
      - name: Run Pytest with HTML Report
        shell: cmd
        run: |
          set PYTHONPATH=automation_framework
          pytest automation_framework/tests --html=report.html --self-contained-html

      # 5️⃣ Upload HTML Report artifact
      - name: Upload HTML Report Artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-report
          path: report.html

      # 6️⃣ Upload Logs artifact
      - name: Upload Logs Artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: logs/test_log.log