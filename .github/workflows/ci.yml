name: Selenium Automation CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Add project to PYTHONPATH
      run: |
        echo "::add-path::$(pwd)/automation_framework"

    - name: Run Pytest with HTML Report
      run: |
        pytest automation_framework/tests --html=report.html --self-contained-html

    - name: Upload HTML Report Artifact
      uses: actions/upload-artifact@v4
      with:
        name: selenium-report
        path: report.html

    - name: Upload Logs Artifact
      uses: actions/upload-artifact@v4
      with:
        name: test-logs
        path: logs/test_log.log